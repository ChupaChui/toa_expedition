{% extends "base.html" %}

{% block content %}
  <section class="form-panel">
    <div class="panel-heading">
      <h2>{{ page_title }}</h2>
      <p>Base slots are always 10. Max slots are calculated as 10 + STR mod + extra slots.</p>
    </div>

    <form class="member-form" method="post">
      <label>
        Name
        <input
          type="text"
          name="name"
          value="{{ member['name'] if member else '' }}"
          placeholder="Vivy"
          required
        >
      </label>

      <label>
        STR mod
        <input
          type="number"
          name="str_mod"
          value="{{ member['str_mod'] if member else 0 }}"
        >
      </label>

      <section class="extra-slots-section">
        <div class="extra-slots-header">
          <div>
            <h3>Extra Slots</h3>
            <p>Add as many extra slot sources as you need.</p>
          </div>
          <button class="ghost-button add-row-button" type="button" id="add-extra-slot">Add row</button>
        </div>

        <div class="extra-slot-list" id="extra-slot-list">
          {% for item in extra_slots %}
            <div class="extra-slot-row">
              <input
                type="text"
                name="extra_slots_name"
                value="{{ item['name'] }}"
                placeholder="Porter, mule, bag of holding"
              >
              <input
                type="number"
                name="extra_slots_amount"
                min="0"
                value="{{ item['amount'] }}"
                placeholder="0"
              >
              <button class="remove-row-button" type="button">Remove</button>
            </div>
          {% endfor %}
        </div>
      </section>

      <div class="form-actions">
        <a class="ghost-button" href="{{ url_for('index') }}">Cancel</a>
        <button class="primary-button" type="submit">Save</button>
      </div>
    </form>
  </section>

  <template id="extra-slot-template">
    <div class="extra-slot-row">
      <input
        type="text"
        name="extra_slots_name"
        placeholder="Porter, mule, bag of holding"
      >
      <input
        type="number"
        name="extra_slots_amount"
        min="0"
        value="0"
        placeholder="0"
      >
      <button class="remove-row-button" type="button">Remove</button>
    </div>
  </template>

  <script>
    const list = document.getElementById("extra-slot-list");
    const addButton = document.getElementById("add-extra-slot");
    const template = document.getElementById("extra-slot-template");

    function bindRemoveButtons() {
      const rows = list.querySelectorAll(".extra-slot-row");
      rows.forEach((row) => {
        const removeButton = row.querySelector(".remove-row-button");
        removeButton.onclick = () => {
          if (list.children.length === 1) {
            row.querySelector('input[name="extra_slots_name"]').value = "";
            row.querySelector('input[name="extra_slots_amount"]').value = 0;
            return;
          }
          row.remove();
        };
      });
    }

    addButton.onclick = () => {
      const clone = template.content.cloneNode(true);
      list.appendChild(clone);
      bindRemoveButtons();
    };

    bindRemoveButtons();
  </script>
{% endblock %}
